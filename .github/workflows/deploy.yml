name: 🏠 Rex Yap - Auto Update Listings

on:
  push:
    branches: [main]
    paths:
      - 'listings_manager.xlsx'
      - 'listingsData.js'
      - 'index.html'
      - 'images/**'
      - 'convert.py'

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install dependencies
        run: pip install openpyxl

      - name: ⚙️ Convert Excel → listingsData.js
        run: python convert.py --excel listings_manager.xlsx --output listingsData.js

      - name: 📤 Commit and push updated listingsData.js
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add listingsData.js
          git diff --staged --quiet || git commit -m "🏠 Auto-update listings from Excel [skip ci]"
          git push
